<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カスタムバトル対戦表ジェネレーター</title>
<style>
    /* 共通変数・基本設定 */
    :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-color: #e0e0e0;
        --border-color: #333;
        --red-team: #e83828;
        --blue-team: #004dff;
        --primary: #bb86fc;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        padding-bottom: 20px;
    }
    h1, h2, h3 { margin-top: 0; }
    
    /* セクション共通 */
    .section {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
    }

    /* フォーム要素 */
    input[type="text"], select, button {
        background-color: #2c2c2c;
        color: var(--text-color);
        border: 1px solid var(--border-color);
        padding: 8px;
        border-radius: 4px;
        font-size: 1rem;
    }
    button {
        cursor: pointer;
        transition: background-color 0.2s;
    }
    button:hover { background-color: #444; }
    .btn-primary { background-color: var(--primary); color: #000; font-weight: bold; }
    .btn-primary:hover { background-color: #a371f7; }
    
    /* メンバータグ */
    .member-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
    }
    .member-tag {
        background-color: #333;
        padding: 5px 10px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.9rem;
    }
    .member-tag button {
        background: none; border: none; color: #aaa; padding: 0; cursor: pointer; font-weight: bold;
    }
    .member-tag button:hover { color: #fff; }

    /* 設定エリア */
    .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 10px;
    }
    .role-list {
        display: none;
        flex-direction: column;
        gap: 5px;
        margin-left: 20px;
        margin-bottom: 10px;
    }

    /* 対戦表結果 */
    .result-area { display: none; }
    .team-card {
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 15px;
        border-left: 5px solid;
    }
    .team-red { border-color: var(--red-team); background-color: rgba(232, 56, 40, 0.1); }
    .team-blue { border-color: var(--blue-team); background-color: rgba(0, 77, 255, 0.1); }
    .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .copy-btn { font-size: 0.8rem; padding: 4px 8px; }
    
    .player-row {
        display: grid;
        grid-template-columns: 1fr 80px 1.5fr;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border-color);
        align-items: center;
    }
    .player-row:last-child { border-bottom: none; }
    .text-ellipsis {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* モーダル共通 */
    .modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 1000;
        justify-content: center; align-items: center;
    }
    .modal-content {
        background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px;
        width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto;
        position: relative; padding: 15px; box-sizing: border-box;
    }
    .modal-header {
        position: sticky; top: -15px; background: var(--card-bg); padding-top: 15px; padding-bottom: 10px;
        border-bottom: 1px solid var(--border-color); margin-bottom: 15px; z-index: 10;
        display: flex; justify-content: space-between; align-items: center; margin-top: -15px;
    }
    .close-btn { background: #333; color: #fff; padding: 5px 15px; border-radius: 4px; border: none; }

    /* 除外キャラ設定グリッド */
    .role-section { margin-bottom: 20px; }
    .role-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-weight: bold; }
    .hero-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px;
    }
    .hero-label {
        display: block; border: 1px solid var(--border-color); border-radius: 4px;
        padding: 5px; text-align: center; cursor: pointer; height: 40px;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.8rem; user-select: none; transition: all 0.2s;
    }
    .hero-checkbox:checked + .hero-label {
        background-color: #333; color: #666; border-color: #444;
    }
    .hero-checkbox { display: none; }

    /* 設定リスト（特殊編成・固定ルール用） */
    .setting-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .setting-card {
        border: 1px solid var(--border-color); border-radius: 4px; padding: 10px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .setting-card.disabled { opacity: 0.5; }
</style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>メンバー管理</h2>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="newMemberName" placeholder="プレイヤー名を入力" style="flex: 1;" onkeypress="if(event.key==='Enter') addMember()">
            <button onclick="addMember()">追加</button>
        </div>
        <div id="memberList" class="member-tags"></div>
    </div>

    <div class="section">
        <h2>抽選設定</h2>
        <div class="setting-row">
            <label>対戦モード</label>
            <select id="matchMode" onchange="updateRoleCheckboxes()">
                <option value="2">2 vs 2 モード</option>
                <option value="3">3 vs 3 モード</option>
            </select>
        </div>
        <div class="setting-row">
            <label><input type="checkbox" id="hideHeroName"> カテゴリ（ロール）のみ表示</label>
        </div>
        
        <hr style="border-color: var(--border-color); margin: 15px 0;">
        
        <div class="setting-row">
            <label><input type="checkbox" id="roleFixedToggle" onchange="toggleRoleFixed()"> ロール固定機能</label>
        </div>
        <div id="roleList" class="role-list">
            <label><input type="checkbox" class="role-fixed-cb" value="ATTACKER" onchange="checkRoleLimit(this)"> アタッカー</label>
            <label><input type="checkbox" class="role-fixed-cb" value="GUNNER" onchange="checkRoleLimit(this)"> ガンナー</label>
            <label><input type="checkbox" class="role-fixed-cb" value="SPRINTER" onchange="checkRoleLimit(this)"> スプリンター</label>
            <label><input type="checkbox" class="role-fixed-cb" value="TANK" onchange="checkRoleLimit(this)"> タンク</label>
        </div>

        <div class="setting-row">
            <label><input type="checkbox" id="sameRoleToggle" onchange="toggleSameRole()"> 同ロール選出機能</label>
        </div>

        <hr style="border-color: var(--border-color); margin: 15px 0;">

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button onclick="openModal('exclusionModal')">キャラクター選出対象除外設定</button>
            <button onclick="openModal('specialCompModal'); renderSpecialComps();">特殊編成設定</button>
            <button onclick="openModal('fixedRuleModal'); renderFixedRules();">個人別・固定ルール設定</button>
        </div>
    </div>

    <button class="btn-primary" style="width: 100%; padding: 15px; font-size: 1.2rem;" onclick="generateTeams()">チーム設定（抽選実行）</button>

    <div id="resultArea" class="section result-area" style="margin-top: 15px;">
        <h2 style="text-align: center; margin-bottom: 5px;">対戦結果</h2>
        <div id="stageResult" style="text-align: center; margin-bottom: 15px; font-weight: bold; color: var(--primary);"></div>
        
        <div class="team-card team-red">
            <div class="team-header">
                <h3 style="color: var(--red-team); margin: 0;">紅チーム</h3>
                <button class="copy-btn" onclick="copyTeam('teamRedArea', this)">リストをコピー</button>
            </div>
            <div id="teamRedArea"></div>
        </div>

        <div class="team-card team-blue">
            <div class="team-header">
                <h3 style="color: var(--blue-team); margin: 0;">蒼チーム</h3>
                <button class="copy-btn" onclick="copyTeam('teamBlueArea', this)">リストをコピー</button>
            </div>
            <div id="teamBlueArea"></div>
        </div>
    </div>
</div>

<div id="exclusionModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>キャラクター選出除外</h3>
            <button class="close-btn" onclick="closeModal('exclusionModal')">閉じる</button>
        </div>
        <div id="exclusionGridArea"></div>
    </div>
</div>

<div id="specialCompModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>特殊編成設定 (10%で発動)</h3>
            <button class="close-btn" onclick="closeModal('specialCompModal')">閉じる</button>
        </div>
        <div class="setting-row">
            <input type="text" id="scName" placeholder="組み合わせ名" style="flex:1;">
            <select id="scCount" onchange="updateScHeroSelects()">
                <option value="2">2人組</option>
                <option value="3">3人組</option>
            </select>
        </div>
        <div id="scHeroSelects" style="display: flex; gap: 5px; margin-bottom: 10px;"></div>
        <button onclick="addSpecialComp()" style="width:100%;">追加</button>
        <div id="specialCompList" class="setting-list"></div>
    </div>
</div>

<div id="fixedRuleModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>個人別・固定ルール設定</h3>
            <button class="close-btn" onclick="closeModal('fixedRuleModal')">閉じる</button>
        </div>
        
        <div style="margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">
            <h4>参加者固定 (同一チーム化)</h4>
            <div class="setting-row">
                <select id="frMemberCount" onchange="updateFrMemberSelects()">
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                </select>
                <button onclick="addFixedMemberRule()">追加</button>
            </div>
            <div id="frMemberSelects" style="display: flex; gap: 5px; margin-bottom: 5px;"></div>
        </div>

        <div style="margin-bottom: 15px;">
            <h4>役割固定 (ロールまたはキャラ)</h4>
            <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 5px;">
                <select id="frRolePlayer"></select>
                <div style="display: flex; gap: 5px;">
                    <select id="frRoleType" style="flex: 1;" onchange="updateFrRoleTarget()">
                        <option value="ROLE">ロール固定</option>
                        <option value="HERO">キャラ固定</option>
                    </select>
                    <select id="frRoleTarget" style="flex: 2;"></select>
                </div>
                <button onclick="addFixedRoleRule()">追加</button>
            </div>
        </div>
        <div id="fixedRuleList" class="setting-list"></div>
    </div>
</div>

<script src="List_Hero.js" onerror="console.warn('List_Hero.js not found. Using default data.');"></script>
<script src="List_Stage.js" onerror="console.warn('List_Stage.js not found. Using default data.');"></script>
<script src="List_NotOwned.js" onerror="console.warn('List_NotOwned.js not found. Using default data.');"></script>

<script>
/**
 * 定数・グローバル変数定義
 */
const ROLES = ['ATTACKER', 'GUNNER', 'SPRINTER', 'TANK'];
const ROLE_NAMES = { 'ATTACKER': 'アタッカー', 'GUNNER': 'ガンナー', 'SPRINTER': 'スプリンター', 'TANK': 'タンク' };

// ダミーデータフォールバック（外部ファイルがない場合用）
if (typeof LIST_HERO === 'undefined') {
    window.LIST_HERO = [
        { role: 'ATTACKER', name: 'ATK_01', jp_name: 'アタッカーA' }, { role: 'ATTACKER', name: 'ATK_02', jp_name: 'アタッカーB' },
        { role: 'GUNNER', name: 'GUN_01', jp_name: 'ガンナーA' }, { role: 'GUNNER', name: 'GUN_02', jp_name: 'ガンナーB' },
        { role: 'SPRINTER', name: 'SPR_01', jp_name: 'スプリンターA' }, { role: 'SPRINTER', name: 'SPR_02', jp_name: 'スプリンターB' },
        { role: 'TANK', name: 'TNK_01', jp_name: 'タンクA' }, { role: 'TANK', name: 'TNK_02', jp_name: 'タンクB' }
    ];
}
if (typeof LIST_STAGE === 'undefined') {
    window.LIST_STAGE = [ { mode: 2, name: 'st_2_1', jp_name: '2v2ステージA' }, { mode: 3, name: 'st_3_1', jp_name: '3v3ステージA' } ];
}
if (typeof LIST_NOT_OWNED === 'undefined') {
    window.LIST_NOT_OWNED = [];
}

// 永続化データ
let members = JSON.parse(localStorage.getItem('compass_members')) || [];
let excludedHeroes = JSON.parse(localStorage.getItem('compass_excluded_heroes')) || [];
let specialComps = JSON.parse(localStorage.getItem('compass_special_comps')) || [];
let fixedRules = JSON.parse(localStorage.getItem('compass_fixed_rules')) || [];

// 履歴データ
let waitScores = JSON.parse(localStorage.getItem('compass_history_waiting')) || {};
let teamHistory = JSON.parse(localStorage.getItem('compass_history_teammates')) || []; // [[red], [blue]] の配列、最大3件
let roleHistory = JSON.parse(localStorage.getItem('compass_history_roles')) || {}; // { name: ['ROLE1', 'ROLE2'] }
let heroHistory = JSON.parse(localStorage.getItem('compass_history_heroes')) || {}; // { name: ['HERO1', ...] }
let matchHistoryAll = JSON.parse(localStorage.getItem('compass_history_all')) || []; // dumpHistory用

/**
 * 初期化処理
 */
window.onload = () => {
    renderMembers();
    buildExclusionGrid();
    updateFrMemberSelects();
    updateFrRolePlayerOptions();
    updateFrRoleTarget();
    updateScHeroSelects();
};

/**
 * データ保存ラッパー
 */
function saveData() {
    localStorage.setItem('compass_members', JSON.stringify(members));
    localStorage.setItem('compass_excluded_heroes', JSON.stringify(excludedHeroes));
    localStorage.setItem('compass_special_comps', JSON.stringify(specialComps));
    localStorage.setItem('compass_fixed_rules', JSON.stringify(fixedRules));
    localStorage.setItem('compass_history_waiting', JSON.stringify(waitScores));
    localStorage.setItem('compass_history_teammates', JSON.stringify(teamHistory));
    localStorage.setItem('compass_history_roles', JSON.stringify(roleHistory));
    localStorage.setItem('compass_history_heroes', JSON.stringify(heroHistory));
    localStorage.setItem('compass_history_all', JSON.stringify(matchHistoryAll));
}

/**
 * UI制御：メンバー管理
 */
function addMember() {
    const input = document.getElementById('newMemberName');
    const name = input.value.trim();
    if (name && !members.includes(name)) {
        members.push(name);
        if (!(name in waitScores)) waitScores[name] = 0;
        input.value = '';
        saveData();
        renderMembers();
        updateFrMemberSelects();
        updateFrRolePlayerOptions();
    }
}

function removeMember(name) {
    members = members.filter(m => m !== name);
    // 関連する固定ルールも削除
    fixedRules = fixedRules.filter(r => !(r.targets && r.targets.includes(name)));
    saveData();
    renderMembers();
    updateFrMemberSelects();
    updateFrRolePlayerOptions();
}

function renderMembers() {
    const container = document.getElementById('memberList');
    container.innerHTML = '';
    members.forEach(name => {
        const div = document.createElement('div');
        div.className = 'member-tag';
        const span = document.createElement('span');
        span.textContent = name; // XSS対策
        const btn = document.createElement('button');
        btn.textContent = '×';
        btn.onclick = () => removeMember(name);
        div.appendChild(span);
        div.appendChild(btn);
        container.appendChild(div);
    });
}

/**
 * UI制御：抽選設定オプション
 */
function toggleRoleFixed() {
    const isChecked = document.getElementById('roleFixedToggle').checked;
    const sameRoleToggle = document.getElementById('sameRoleToggle');
    document.getElementById('roleList').style.display = isChecked ? 'flex' : 'none';
    if (isChecked) {
        sameRoleToggle.checked = false;
        sameRoleToggle.disabled = true;
    } else {
        sameRoleToggle.disabled = false;
    }
    updateRoleCheckboxes();
}

function toggleSameRole() {
    const isChecked = document.getElementById('sameRoleToggle').checked;
    const roleFixedToggle = document.getElementById('roleFixedToggle');
    if (isChecked) {
        roleFixedToggle.checked = false;
        roleFixedToggle.disabled = true;
        document.getElementById('roleList').style.display = 'none';
    } else {
        roleFixedToggle.disabled = false;
    }
}

function updateRoleCheckboxes() {
    const mode = parseInt(document.getElementById('matchMode').value, 10);
    const cbs = document.querySelectorAll('.role-fixed-cb');
    let checkedCount = 0;
    cbs.forEach(cb => { if(cb.checked) checkedCount++; });
    cbs.forEach(cb => {
        if (!cb.checked) {
            cb.disabled = checkedCount >= mode;
        } else {
            cb.disabled = false;
        }
    });
}

function checkRoleLimit(clickedCb) {
    updateRoleCheckboxes();
}

/**
 * モーダル制御
 */
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

/**
 * キャラ除外設定
 */
function buildExclusionGrid() {
    const container = document.getElementById('exclusionGridArea');
    container.innerHTML = '';
    
    ROLES.forEach(role => {
        const heroes = LIST_HERO.filter(h => h.role === role);
        if (heroes.length === 0) return;

        const section = document.createElement('div');
        section.className = 'role-section';
        
        const header = document.createElement('div');
        header.className = 'role-header';
        const checkAll = document.createElement('input');
        checkAll.type = 'checkbox';
        checkAll.onchange = (e) => toggleRoleExclusion(role, e.target.checked);
        const title = document.createElement('span');
        title.textContent = `${ROLE_NAMES[role]} (全選択/解除)`;
        header.appendChild(checkAll);
        header.appendChild(title);
        section.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'hero-grid';
        heroes.forEach(h => {
            const wrapper = document.createElement('div');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = `ex_${h.name}`;
            cb.className = 'hero-checkbox';
            cb.value = h.name;
            cb.checked = excludedHeroes.includes(h.name);
            cb.onchange = (e) => updateExclusion(h.name, e.target.checked);
            
            const label = document.createElement('label');
            label.htmlFor = cb.id;
            label.className = 'hero-label text-ellipsis';
            label.textContent = h.jp_name;
            
            wrapper.appendChild(cb);
            wrapper.appendChild(label);
            grid.appendChild(wrapper);
        });
        section.appendChild(grid);
        container.appendChild(section);
    });
}

function updateExclusion(heroName, isExcluded) {
    if (isExcluded) {
        if (!excludedHeroes.includes(heroName)) excludedHeroes.push(heroName);
    } else {
        excludedHeroes = excludedHeroes.filter(h => h !== heroName);
    }
    saveData();
}

function toggleRoleExclusion(role, isExcluded) {
    const heroes = LIST_HERO.filter(h => h.role === role);
    heroes.forEach(h => {
        const cb = document.getElementById(`ex_${h.name}`);
        if (cb) {
            cb.checked = isExcluded;
            updateExclusion(h.name, isExcluded);
        }
    });
}

/**
 * 特殊編成設定
 */
function updateScHeroSelects() {
    const count = parseInt(document.getElementById('scCount').value, 10);
    const container = document.getElementById('scHeroSelects');
    container.innerHTML = '';
    for(let i=0; i<count; i++) {
        const sel = document.createElement('select');
        sel.style.flex = "1";
        LIST_HERO.forEach(h => {
            const opt = document.createElement('option');
            opt.value = h.name; opt.textContent = h.jp_name;
            sel.appendChild(opt);
        });
        container.appendChild(sel);
    }
}

function addSpecialComp() {
    const nameInput = document.getElementById('scName').value.trim();
    if (!nameInput) return alert('組み合わせ名を入力してください');
    const selects = document.getElementById('scHeroSelects').querySelectorAll('select');
    let heroes = Array.from(selects).map(s => s.value);
    
    specialComps.push({ id: Date.now(), name: nameInput, heroes: heroes, enabled: true });
    saveData();
    document.getElementById('scName').value = '';
    renderSpecialComps();
}

function renderSpecialComps() {
    const container = document.getElementById('specialCompList');
    container.innerHTML = '';
    specialComps.forEach(sc => {
        const div = document.createElement('div');
        div.className = `setting-card ${sc.enabled ? '' : 'disabled'}`;
        
        const info = document.createElement('div');
        const hNames = sc.heroes.map(hn => LIST_HERO.find(h=>h.name===hn)?.jp_name || hn).join(' + ');
        const text = document.createElement('span');
        text.textContent = `${sc.name} [${hNames}]`;
        info.appendChild(text);

        const controls = document.createElement('div');
        const toggleBtn = document.createElement('button');
        toggleBtn.textContent = sc.enabled ? '無効化' : '有効化';
        toggleBtn.onclick = () => { sc.enabled = !sc.enabled; saveData(); renderSpecialComps(); };
        const delBtn = document.createElement('button');
        delBtn.textContent = '削除';
        delBtn.onclick = () => { specialComps = specialComps.filter(s => s.id !== sc.id); saveData(); renderSpecialComps(); };
        
        controls.appendChild(toggleBtn); controls.appendChild(delBtn);
        div.appendChild(info); div.appendChild(controls);
        container.appendChild(div);
    });
}

/**
 * 個人別・固定ルール設定
 */
function updateFrMemberSelects() {
    const count = parseInt(document.getElementById('frMemberCount').value, 10);
    const container = document.getElementById('frMemberSelects');
    container.innerHTML = '';
    for(let i=0; i<count; i++) {
        const sel = document.createElement('select');
        sel.style.flex = "1";
        members.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m; opt.textContent = m;
            sel.appendChild(opt);
        });
        container.appendChild(sel);
    }
}

function updateFrRolePlayerOptions() {
    const sel = document.getElementById('frRolePlayer');
    sel.innerHTML = '';
    members.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m; opt.textContent = m;
        sel.appendChild(opt);
    });
}

function updateFrRoleTarget() {
    const type = document.getElementById('frRoleType').value;
    const targetSel = document.getElementById('frRoleTarget');
    targetSel.innerHTML = '';
    if (type === 'ROLE') {
        ROLES.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r; opt.textContent = ROLE_NAMES[r];
            targetSel.appendChild(opt);
        });
    } else {
        LIST_HERO.forEach(h => {
            const opt = document.createElement('option');
            opt.value = h.name; opt.textContent = h.jp_name;
            targetSel.appendChild(opt);
        });
    }
}

function addFixedMemberRule() {
    const selects = document.getElementById('frMemberSelects').querySelectorAll('select');
    let targets = Array.from(selects).map(s => s.value);
    if (new Set(targets).size !== targets.length) return alert('参加者が重複しています');
    fixedRules.push({ id: Date.now(), type: 'MEMBER', targets: targets, enabled: true });
    saveData(); renderFixedRules();
}

function addFixedRoleRule() {
    const player = document.getElementById('frRolePlayer').value;
    const type = document.getElementById('frRoleType').value;
    const target = document.getElementById('frRoleTarget').value;
    if (!player) return;
    fixedRules.push({ id: Date.now(), type: type, targets: [player], targetVal: target, enabled: true });
    saveData(); renderFixedRules();
}

function renderFixedRules() {
    const container = document.getElementById('fixedRuleList');
    container.innerHTML = '';
    fixedRules.forEach(rule => {
        const div = document.createElement('div');
        div.className = `setting-card ${rule.enabled ? '' : 'disabled'}`;
        
        const text = document.createElement('span');
        if (rule.type === 'MEMBER') {
            text.textContent = `[参加者固定] ${rule.targets.join(' + ')}`;
        } else if (rule.type === 'ROLE') {
            text.textContent = `[ロール固定] ${rule.targets[0]} -> ${ROLE_NAMES[rule.targetVal]}`;
        } else {
            const hName = LIST_HERO.find(h=>h.name===rule.targetVal)?.jp_name || rule.targetVal;
            text.textContent = `[キャラ固定] ${rule.targets[0]} -> ${hName}`;
        }
        
        const controls = document.createElement('div');
        const toggleBtn = document.createElement('button');
        toggleBtn.textContent = rule.enabled ? '無効化' : '有効化';
        toggleBtn.onclick = () => { rule.enabled = !rule.enabled; saveData(); renderFixedRules(); };
        const delBtn = document.createElement('button');
        delBtn.textContent = '削除';
        delBtn.onclick = () => { fixedRules = fixedRules.filter(r => r.id !== rule.id); saveData(); renderFixedRules(); };
        
        controls.appendChild(toggleBtn); controls.appendChild(delBtn);
        div.appendChild(text); div.appendChild(controls);
        container.appendChild(div);
    });
}

/**
 * ユーティリティ配列シャッフル
 */
function shuffle(array) {
    let ary = [...array];
    for (let i = ary.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ary[i], ary[j]] = [ary[j], ary[i]];
    }
    return ary;
}

/**
 * メイン抽選ロジック
 */
function generateTeams() {
    const mode = parseInt(document.getElementById('matchMode').value, 10);
    const requiredPlayers = mode * 2;

    if (members.length < requiredPlayers) {
        alert(`登録メンバー数が足りません。${requiredPlayers}名以上登録してください。`);
        return;
    }

    // 1. プレイヤー選出 (待機スコア + メンバー固定考慮)
    let pool = shuffle([...members]);
    pool.sort((a, b) => (waitScores[b] || 0) - (waitScores[a] || 0));

    let selectedPlayers = [];
    for (let p of pool) {
        if (selectedPlayers.length >= requiredPlayers) break;
        if (selectedPlayers.includes(p)) continue;

        let memberRule = fixedRules.find(r => r.type === 'MEMBER' && r.enabled && r.targets.includes(p));
        if (memberRule) {
            let needed = memberRule.targets.filter(t => !selectedPlayers.includes(t) && members.includes(t));
            if (selectedPlayers.length + needed.length <= requiredPlayers) {
                selectedPlayers.push(...needed);
            }
            // 定員オーバーならスキップ
        } else {
            selectedPlayers.push(p);
        }
    }

    // 待機スコア更新
    members.forEach(m => {
        if (selectedPlayers.includes(m)) waitScores[m] = 0;
        else waitScores[m] = (waitScores[m] || 0) + 1;
    });

    // 2. チーム分け (アンチ・ペアリング + メンバー固定考慮)
    const allCombinations = getTeamCombinations(selectedPlayers, mode);
    let validCombinations = allCombinations.filter(comb => {
        // 固定ルールを満たしているかチェック
        let valid = true;
        const activeMemberRules = fixedRules.filter(r => r.type === 'MEMBER' && r.enabled);
        for (let rule of activeMemberRules) {
            let inRed = rule.targets.every(t => comb[0].includes(t) || !selectedPlayers.includes(t));
            let inBlue = rule.targets.every(t => comb[1].includes(t) || !selectedPlayers.includes(t));
            if (!inRed && !inBlue) { valid = false; break; } // バラバラになったら無効
        }
        return valid;
    });

    if (validCombinations.length === 0) validCombinations = allCombinations; // フォールバック

    // ペナルティ計算
    let minPenalty = Infinity;
    let bestCombinations = [];
    validCombinations.forEach(comb => {
        let penalty = 0;
        teamHistory.forEach(historyMatch => { // [[red_p1, red_p2], [blue_p1, blue_p2]]
            comb.forEach(team => {
                let overlap = historyMatch[0].filter(p => team.includes(p)).length;
                if(overlap >= 2) penalty++;
                overlap = historyMatch[1].filter(p => team.includes(p)).length;
                if(overlap >= 2) penalty++;
            });
        });
        if (penalty < minPenalty) {
            minPenalty = penalty;
            bestCombinations = [comb];
        } else if (penalty === minPenalty) {
            bestCombinations.push(comb);
        }
    });

    const finalTeams = shuffle(bestCombinations)[0];
    const teamRedPlayers = finalTeams[0];
    const teamBluePlayers = finalTeams[1];

    // ステージ抽選
    const stages = LIST_STAGE.filter(s => s.mode === mode);
    const selectedStage = stages[Math.floor(Math.random() * stages.length)];

    // 3. ロール枠とキャラの割り当て
    const teamRedData = assignRolesAndHeroes(teamRedPlayers, mode, 'RED');
    const teamBlueData = assignRolesAndHeroes(teamBluePlayers, mode, 'BLUE', teamRedData.roleAllocations);

    // 履歴更新
    teamHistory.unshift([teamRedPlayers, teamBluePlayers]);
    if (teamHistory.length > 3) teamHistory.pop();
    
    let matchNo = matchHistoryAll.length + 1;
    [...teamRedData.results, ...teamBlueData.results].forEach(res => {
        let p = res.player;
        if (!roleHistory[p]) roleHistory[p] = [];
        roleHistory[p].unshift(res.role);
        if (roleHistory[p].length > 2) roleHistory[p].pop();

        if (!heroHistory[p]) heroHistory[p] = [];
        heroHistory[p].unshift(res.hero.name);
        if (heroHistory[p].length > 10) heroHistory[p].pop();

        matchHistoryAll.push({
            no: matchNo,
            team: teamRedPlayers.includes(p) ? '紅' : '蒼',
            player: p,
            role: ROLE_NAMES[res.role],
            hero: res.hero.jp_name
        });
    });

    saveData();

    // 4. 結果描画
    drawResult(selectedStage, teamRedData.results, teamBlueData.results);
}

/**
 * 組み合わせ生成再帰関数
 */
function getTeamCombinations(players, teamSize) {
    let results = [];
    function combine(idx, currentTeam) {
        if (currentTeam.length === teamSize) {
            let otherTeam = players.filter(p => !currentTeam.includes(p));
            // 重複排除のための簡易策 (配列のソート後文字列表現で判定等もできるが、カスタムなら全探索でOK)
            results.push([currentTeam, otherTeam]);
            return;
        }
        for (let i = idx; i < players.length; i++) {
            combine(i + 1, [...currentTeam, players[i]]);
        }
    }
    combine(0, []);
    // 半分にする(AとB、BとAの重複排除)
    return results.slice(0, results.length / 2);
}

/**
 * チーム内の役割・キャラ割り当てコアロジック
 */
function assignRolesAndHeroes(players, mode, teamColor, opponentRoles = null) {
    const isRoleFixed = document.getElementById('roleFixedToggle').checked;
    const isSameRole = document.getElementById('sameRoleToggle').checked;
    
    // 個人固定ルールの抽出
    let fixedPlayerRules = players.map(p => {
        return { player: p, rule: fixedRules.find(r => r.enabled && r.targets.includes(p) && (r.type === 'ROLE' || r.type === 'HERO')) };
    }).filter(x => x.rule);

    let requiredRoles = [];
    fixedPlayerRules.forEach(x => {
        if (x.rule.type === 'ROLE') requiredRoles.push(x.rule.targetVal);
        else {
            let h = LIST_HERO.find(h => h.name === x.rule.targetVal);
            if (h) requiredRoles.push(h.role);
        }
    });

    // 枠の決定
    let targetRoles = [];
    if (isSameRole && opponentRoles) {
        targetRoles = [...opponentRoles]; // 相手と同じ
    } else {
        // 重複なしで作成
        targetRoles = [...requiredRoles]; // 必須を先に入れる
        
        let pool = [...ROLES];
        if (isRoleFixed) {
            let fixedChecked = Array.from(document.querySelectorAll('.role-fixed-cb')).filter(cb=>cb.checked).map(cb=>cb.value);
            fixedChecked.forEach(r => {
                if(!targetRoles.includes(r)) targetRoles.push(r);
            });
        }
        
        // 足りない分をランダムに追加
        pool = shuffle(pool.filter(r => !targetRoles.includes(r)));
        while(targetRoles.length < mode && pool.length > 0) {
            targetRoles.push(pool.pop());
        }
        // それでも足りない（重複必須要求など異常時）
        while(targetRoles.length < mode) targetRoles.push(ROLES[Math.floor(Math.random()*ROLES.length)]);
    }

    targetRoles = targetRoles.slice(0, mode); // 念のためカット

    // プレイヤーへのロール割り当て（個人固定優先 -> 履歴考慮）
    let unassignedPlayers = [...players];
    let unassignedRoles = [...targetRoles];
    let allocations = []; // { player, role, forcedHero }

    // 個人固定反映
    fixedPlayerRules.forEach(x => {
        let role = x.rule.type === 'ROLE' ? x.rule.targetVal : LIST_HERO.find(h => h.name === x.rule.targetVal).role;
        let idx = unassignedRoles.indexOf(role);
        if (idx !== -1) {
            allocations.push({ player: x.player, role: role, forcedHero: x.rule.type === 'HERO' ? x.rule.targetVal : null });
            unassignedRoles.splice(idx, 1);
            unassignedPlayers = unassignedPlayers.filter(p => p !== x.player);
        }
    });

    // 残りの割り当て (直近2試合履歴を避ける)
    unassignedPlayers = shuffle(unassignedPlayers);
    for (let p of unassignedPlayers) {
        let pRoleHistory = roleHistory[p] || [];
        let candidates = unassignedRoles.filter(r => !pRoleHistory.includes(r));
        if (candidates.length === 0) candidates = unassignedRoles; // フォールバック
        let chosenRole = candidates[Math.floor(Math.random() * candidates.length)];
        
        allocations.push({ player: p, role: chosenRole, forcedHero: null });
        unassignedRoles.splice(unassignedRoles.indexOf(chosenRole), 1);
    }

    // 特殊編成の割り込み判定
    let appliedScHeroes = {}; // { player: heroName }
    const activeSc = specialComps.filter(sc => sc.enabled);
    if (activeSc.length > 0) {
        let teamRoleMap = allocations.map(a => a.role).sort().join(',');
        for (let sc of shuffle(activeSc)) {
            let scHeroesObj = sc.heroes.map(hn => LIST_HERO.find(h=>h.name===hn)).filter(Boolean);
            if (scHeroesObj.length !== mode) continue;
            let scRoleMap = scHeroesObj.map(h => h.role).sort().join(',');
            if (teamRoleMap === scRoleMap) {
                // 除外・非所持チェック
                let canApply = true;
                for (let i=0; i<allocations.length; i++) {
                    let alloc = allocations[i];
                    if (alloc.forcedHero) continue; // 個人固定優先
                    let targetScHero = scHeroesObj.find(h => h.role === alloc.role);
                    if (!targetScHero) { canApply = false; break; }
                    
                    if (excludedHeroes.includes(targetScHero.name)) { canApply = false; break; }
                    let notOwned = LIST_NOT_OWNED.filter(n => n.player_jp_name === alloc.player).map(n => n.hero_name);
                    if (notOwned.includes(targetScHero.name)) { canApply = false; break; }
                }
                
                if (canApply && Math.random() < 0.10) { // 10%で発動
                    allocations.forEach(alloc => {
                        if (!alloc.forcedHero) {
                            let h = scHeroesObj.find(h => h.role === alloc.role);
                            if(h) appliedScHeroes[alloc.player] = h.name;
                        }
                    });
                    break; // 1つ適用したら抜ける
                }
            }
        }
    }

    // キャラクター選出 (LRU)
    let results = allocations.map(alloc => {
        let hero = null;
        if (alloc.forcedHero) {
            hero = LIST_HERO.find(h => h.name === alloc.forcedHero);
        } else if (appliedScHeroes[alloc.player]) {
            hero = LIST_HERO.find(h => h.name === appliedScHeroes[alloc.player]);
        } else {
            hero = selectHeroLRU(alloc.role, alloc.player);
        }
        // フォールバック（万が一見つからない場合）
        if(!hero) {
            let fallbackList = LIST_HERO.filter(h=>h.role===alloc.role);
            hero = fallbackList[Math.floor(Math.random()*fallbackList.length)];
        }
        return { player: alloc.player, role: alloc.role, hero: hero };
    });

    // ソート (アタッカー → ガンナー → スプリンター → タンク)
    results.sort((a, b) => ROLES.indexOf(a.role) - ROLES.indexOf(b.role));

    return { roleAllocations: targetRoles, results: results };
}

function selectHeroLRU(role, player) {
    let candidates = LIST_HERO.filter(h => h.role === role);
    candidates = candidates.filter(h => !excludedHeroes.includes(h.name));
    
    let notOwned = LIST_NOT_OWNED.filter(n => n.player_jp_name === player).map(n => n.hero_name);
    candidates = candidates.filter(h => !notOwned.includes(h.name));

    if (candidates.length === 0) candidates = LIST_HERO.filter(h => h.role === role);

    let history = heroHistory[player] || []; // [new, ..., old]
    let unused = candidates.filter(h => !history.includes(h.name));
    
    if (unused.length > 0) {
        return unused[Math.floor(Math.random() * unused.length)];
    }

    // 全て使用済みの場合、最も履歴の古いもの（配列の末尾に近いもの）を選ぶ
    // indexOfは配列の前方（新しい方）のインデックスを返す
    candidates.sort((a, b) => history.indexOf(b.name) - history.indexOf(a.name));
    let oldestIndex = history.indexOf(candidates[0].name);
    let oldestCandidates = candidates.filter(h => history.indexOf(h.name) === oldestIndex);
    return oldestCandidates[Math.floor(Math.random() * oldestCandidates.length)];
}

/**
 * 結果描画
 */
function drawResult(stage, redResults, blueResults) {
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('stageResult').textContent = `ステージ: ${stage.jp_name}`;
    
    const isHideHero = document.getElementById('hideHeroName').checked;

    const buildHtml = (results) => {
        return results.map(r => `
            <div class="player-row">
                <div class="text-ellipsis" title="${r.player}">${r.player}</div>
                <div style="font-size: 0.85rem; color: #aaa;">${ROLE_NAMES[r.role]}</div>
                <div class="text-ellipsis" style="font-weight: bold;" title="${r.hero.jp_name}">${isHideHero ? '???' : r.hero.jp_name}</div>
            </div>
        `).join('');
    };

    document.getElementById('teamRedArea').innerHTML = buildHtml(redResults);
    document.getElementById('teamBlueArea').innerHTML = buildHtml(blueResults);
}

/**
 * コピー機能
 */
function copyTeam(areaId, btnElement) {
    const area = document.getElementById(areaId);
    // 参加者名だけを抽出 (DOM構造依存)
    const players = Array.from(area.querySelectorAll('.player-row > div:first-child')).map(el => el.textContent);
    const text = players.join('、');
    
    navigator.clipboard.writeText(text).then(() => {
        const originalText = btnElement.textContent;
        btnElement.textContent = 'コピー完了!';
        btnElement.style.backgroundColor = '#4caf50';
        btnElement.style.color = '#fff';
        setTimeout(() => {
            btnElement.textContent = originalText;
            btnElement.style.backgroundColor = '';
            btnElement.style.color = '';
        }, 2000);
    });
}
