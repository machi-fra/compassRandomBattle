<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カスタムバトル対戦表</title>
    <script src="List_Hero.js"></script>
    <script src="List_Stage.js"></script>
    <script src="List_NotOwned.js"></script>

    <style>
        /* ============================
           CSS: 画面・UI仕様 (ダークモード)
           ============================ */
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --color-red: #e83828;
            --color-blue: #004dff;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1, h2, h3 { margin-top: 0; }
        
        /* セクション共通 */
        .section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        /* フォーム要素 */
        input[type="text"] {
            background-color: #2c2c2c;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
            width: calc(100% - 70px);
        }
        button {
            background-color: #444;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #555; }
        button:disabled { background-color: #222; color: #666; cursor: not-allowed; }

        .btn-primary {
            background-color: #007bff;
            width: 100%;
            font-size: 1.1rem;
            padding: 12px;
            margin-top: 10px;
        }
        .btn-primary:hover { background-color: #0056b3; }

        /* メンバータグ */
        #member-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .member-tag {
            background-color: #333;
            padding: 4px 8px 4px 12px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            font-size: 0.9rem;
        }
        .member-delete {
            background: none;
            border: none;
            color: #aaa;
            margin-left: 5px;
            padding: 0 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .member-delete:hover { color: #fff; }

        /* オプション設定エリア */
        .option-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .role-fixed-area {
            display: flex;
            flex-direction: column;
            margin-left: 20px;
            gap: 5px;
        }

        /* モーダルウィンドウ */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #modal-window {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        #modal-header {
            position: sticky;
            top: 0;
            background: var(--bg-card);
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .modal-body { padding: 15px; }
        .role-section { margin-bottom: 20px; }
        .role-title { font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 8px;
        }
        .hero-label {
            display: flex;
            align-items: center;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0 5px;
            cursor: pointer;
            user-select: none;
            font-size: 0.8rem;
            transition: background 0.2s, color 0.2s;
        }
        .hero-label input { display: none; }
        .hero-label.excluded { background-color: #333; color: #777; text-decoration: line-through; }

        /* 対戦表（結果）エリア */
        .result-header { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        .team-card {
            border: 2px solid;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: var(--bg-card);
            overflow: hidden;
        }
        .team-red { border-color: var(--color-red); }
        .team-blue { border-color: var(--color-blue); }
        
        .team-header {
            padding: 8px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-red .team-header { background-color: rgba(232, 56, 40, 0.2); }
        .team-blue .team-header { background-color: rgba(0, 77, 255, 0.2); }

        .player-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1.5fr;
            padding: 10px 15px;
            border-top: 1px solid var(--border-color);
            align-items: center;
        }
        .player-name, .player-hero {
            white-space: nowrap;
            overflow: hidden;
        }
        .player-role { font-size: 0.9rem; color: #aaa; text-align: center; }

        .copy-btn {
            background-color: transparent;
            border: 1px solid currentColor;
            padding: 4px 8px;
            font-size: 0.8rem;

        }
        .team-red .copy-btn { color: var(--color-red); }
        .team-blue .copy-btn { color: var(--color-blue); }

<body>

<div class="container">
    <h2 style="text-align:center;">カスタムバトル対戦表</h2>

    <div class="section">
        <h3>メンバー管理</h3>
        <div style="display:flex; gap: 5px;">
            <input type="text" id="member-input" placeholder="メンバー名を入力 (Enterで追加)" maxlength="20">
            <button id="add-member-btn" style="width: 60px;">追加</button>
        </div>
        <div id="member-list"></div>
    </div>

    <div class="section">
        <h3>抽選設定</h3>
        <div class="option-row">
            <label>
                <input type="radio" name="mode" value="2" checked> 2 vs 2 モード
            </label>
            <label>
                <input type="radio" name="mode" value="3"> 3 vs 3 モード
            </label>
        </div>
        
        <div class="option-row">
            <label>
                <input type="checkbox" id="opt-hide-hero"> カテゴリ(ロール)のみ表示
            </label>
        </div>

        <div class="option-row">
            <label>
                <input type="checkbox" id="opt-same-role"> 同ロール選出（両チーム同じ構成）
            </label>
        </div>

        <div class="option-row" style="align-items: flex-start;">
            <label>
                <input type="checkbox" id="opt-fix-role"> ロール固定
            </label>
            <div class="role-fixed-area" id="role-fixed-area" style="display: none;">
                <label><input type="checkbox" class="fix-role-chk" value="ATTACKER"> アタッカー</label>
                <label><input type="checkbox" class="fix-role-chk" value="GUNNER"> ガンナー</label>
                <label><input type="checkbox" class="fix-role-chk" value="SPRINTER"> スプリンター</label>
                <label><input type="checkbox" class="fix-role-chk" value="TANK"> タンク</label>
            </div>
        </div>

        <div class="option-row" style="margin-top: 15px;">
            <button id="exclude-hero-btn">キャラクター除外設定を開く</button>
        </div>

        <button id="generate-btn" class="btn-primary">チーム設定 (抽選)</button>
    </div>

    <div id="result-area" class="section" style="display:none; padding: 0; background: transparent; border: none;">
        <div class="result-header" id="result-stage">ステージ名</div>
        <div id="team-red-container"></div>
        <div id="team-blue-container"></div>
    </div>
</div>

<div id="modal-overlay">
    <div id="modal-window">
        <div id="modal-header">
            <h3 style="margin:0;">キャラクター除外設定</h3>
            <button id="modal-close">閉じる</button>
        </div>
        <div class="modal-body" id="modal-body">
            </div>
    </div>
</div>

<script>
/* =========================================================
   JavaScript ロジック
   ========================================================= */

// --- 1. 定数・グローバル変数定義 ---
// 外部ファイルがない場合のフォールバック（エラー回避用）
const ROLES = { ATTACKER: 'アタッカー', GUNNER: 'ガンナー', SPRINTER: 'スプリンター', TANK: 'タンク' };
const ROLE_KEYS = Object.keys(ROLES);
const HEROES = typeof LIST_HERO !== 'undefined' ? LIST_HERO : [];
const STAGES = typeof LIST_STAGE !== 'undefined' ? LIST_STAGE : [];
const NOT_OWNED = typeof LIST_NOT_OWNED !== 'undefined' ? LIST_NOT_OWNED : [];

// 内部状態
let members = [];
let excludedHeroes = new Set(); // 除外されたヒーロー定義名
let matchHistory = []; // デバッグ用全体履歴

// メモリ上の履歴（重複対策用）
let state = {
    standbyScores: {}, // 待機スコア { "プレイヤー名": score }
    teamHistory: [],   // 過去3試合のチーム分け履歴 [ [{red:[], blue:[]}], ... ]
    roleHistory: {},   // 直近2試合のロール履歴 { "プレイヤー名": ["ATTACKER", "TANK"] }
    heroHistory: {}    // 過去10試合のヒーロー履歴 { "プレイヤー名": ["HERO_01", ...] }
};

// --- 2. 初期化処理・UIバインディング ---
document.addEventListener('DOMContentLoaded', () => {
    loadMembers();
    setupEventListeners();
    buildExcludeModal();
});

function setupEventListeners() {
    // メンバー追加
    const addBtn = document.getElementById('add-member-btn');
    const memberInput = document.getElementById('member-input');
    addBtn.addEventListener('click', addMember);
    memberInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addMember();
    });

    // オプション排他・連動制御
    const modeRadios = document.getElementsByName('mode');
    const optSameRole = document.getElementById('opt-same-role');
    const optFixRole = document.getElementById('opt-fix-role');
    const roleFixedArea = document.getElementById('role-fixed-area');
    const fixRoleChks = document.querySelectorAll('.fix-role-chk');

    modeRadios.forEach(r => r.addEventListener('change', updateRoleCheckboxes));
    
    optSameRole.addEventListener('change', (e) => {
        if (e.target.checked) {
            optFixRole.checked = false;
            roleFixedArea.style.display = 'none';
        }
    });

    optFixRole.addEventListener('change', (e) => {
        if (e.target.checked) {
            optSameRole.checked = false;
            roleFixedArea.style.display = 'flex';
        } else {
            roleFixedArea.style.display = 'none';
        }
        updateRoleCheckboxes();
    });

    fixRoleChks.forEach(chk => {
        chk.addEventListener('change', updateRoleCheckboxes);
    });

    // モーダル制御
    document.getElementById('exclude-hero-btn').addEventListener('click', () => {
        document.getElementById('modal-overlay').style.display = 'flex';
    });
    document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('modal-overlay').style.display = 'none';
    });

    // 抽選実行
    document.getElementById('generate-btn').addEventListener('click', () => executeMatching(false));
}

// ロール固定の最大数制限制御
function updateRoleCheckboxes() {
    const maxSelect = parseInt(document.querySelector('input[name="mode"]:checked').value);
    const checkedCount = document.querySelectorAll('.fix-role-chk:checked').length;
    const chks = document.querySelectorAll('.fix-role-chk');

    chks.forEach(chk => {
        if (!chk.checked && checkedCount >= maxSelect) {
            chk.disabled = true;
        } else {
            chk.disabled = false;
        }
    });
}

// --- 3. メンバー管理機能 ---
function loadMembers() {
    const saved = localStorage.getItem('compass_members');
    if (saved) {
        members = JSON.parse(saved);
        renderMembers();
    }
}

function saveMembers() {
    localStorage.setItem('compass_members', JSON.stringify(members));
}

function addMember() {
    const input = document.getElementById('member-input');
    const name = input.value.trim();
    if (!name) return;
    if (members.includes(name)) {
        alert('既に登録されています。');
        return;
    }
    members.push(name);
    if (!(name in state.standbyScores)) state.standbyScores[name] = 0;
    saveMembers();
    renderMembers();
    input.value = '';
}

function removeMember(name) {
    members = members.filter(m => m !== name);
    saveMembers();
    renderMembers();
}

function renderMembers() {
    const list = document.getElementById('member-list');
    list.innerHTML = ''; // 構造リセット
    members.forEach(name => {
        const tag = document.createElement('div');
        tag.className = 'member-tag';
        tag.textContent = name; // XSS対策: textContentを使用

        const delBtn = document.createElement('button');
        delBtn.className = 'member-delete';
        delBtn.textContent = '×';
        delBtn.onclick = () => removeMember(name);
        
        tag.appendChild(delBtn);
        list.appendChild(tag);
    });
}

// --- 4. キャラクター除外 モーダル生成 ---
function buildExcludeModal() {
    const body = document.getElementById('modal-body');
    body.innerHTML = '';

    ROLE_KEYS.forEach(roleKey => {
        // ロールごとのヒーロー抽出
        const heroesInRole = HEROES.filter(h => h.role === roleKey);
        if (heroesInRole.length === 0) return;

        const section = document.createElement('div');
        section.className = 'role-section';

        const titleDiv = document.createElement('div');
        titleDiv.className = 'role-title';
        const selectAllChk = document.createElement('input');
        selectAllChk.type = 'checkbox';
        selectAllChk.id = `chk-all-${roleKey}`;
        const titleLabel = document.createElement('label');
        titleLabel.htmlFor = `chk-all-${roleKey}`;
        titleLabel.textContent = ` ${ROLES[roleKey]} (全選択/解除)`;
        titleLabel.style.cursor = 'pointer';
        
        titleDiv.appendChild(selectAllChk);
        titleDiv.appendChild(titleLabel);
        section.appendChild(titleDiv);

        const grid = document.createElement('div');
        grid.className = 'hero-grid';

        const heroCheckboxes = [];

        heroesInRole.forEach(hero => {
            const label = document.createElement('label');
            label.className = 'hero-label';
            
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.value = hero.name;
            
            // UIと内部データ(Set)の同期
            chk.addEventListener('change', (e) => {
                if (e.target.checked) {
                    excludedHeroes.add(hero.name);
                    label.classList.add('excluded');
                } else {
                    excludedHeroes.delete(hero.name);
                    label.classList.remove('excluded');
                }
                // 全選択チェックボックスの半端状態更新
                const allChecked = heroCheckboxes.every(c => c.checked);
                selectAllChk.checked = allChecked;
            });

            label.appendChild(chk);
            label.appendChild(document.createTextNode(hero.jp_name));
            grid.appendChild(label);
            heroCheckboxes.push(chk);
        });

        // 全選択の連動
        selectAllChk.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            heroCheckboxes.forEach(chk => {
                if (chk.checked !== isChecked) {
                    chk.checked = isChecked;
                    chk.dispatchEvent(new Event('change')); // 個別のイベント発火
                }
            });
        });

        section.appendChild(grid);
        body.appendChild(section);
    });
}

// --- 5. ユーティリティ・アルゴリズム関数 ---

// 配列シャッフル (Fisher-Yates)
function shuffle(array) {
    let ary = [...array];
    for (let i = ary.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [ary[i], ary[j]] = [ary[j], ary[i]];
    }
    return ary;
}

// 組み合わせ生成 (nCr)
function getCombinations(array, size) {
    const result = [];
    function backtrack(start, combo) {
        if (combo.length === size) {
            result.push([...combo]);
            return;
        }
        for (let i = start; i < array.length; i++) {
            combo.push(array[i]);
            backtrack(i + 1, combo);
            combo.pop();
        }
    }
    backtrack(0, []);
    return result;
}

// 順列生成 (nPr)
function getPermutations(array) {
    const result = [];
    function backtrack(path, used) {
        if (path.length === array.length) {
            result.push([...path]);
            return;
        }
        for (let i = 0; i < array.length; i++) {
            if (used[i]) continue;
            used[i] = true;
            path.push(array[i]);
            backtrack(path, used);
            path.pop();
            used[i] = false;
        }
    }
    backtrack([], []);
    return result;
}

// --- 6. 抽選・マッチング メインロジック ---

function executeMatching(isSilent = false) {
    const mode = parseInt(document.querySelector('input[name="mode"]:checked').value);
    const requiredPlayers = mode * 2;

    if (members.length < requiredPlayers) {
        if (!isSilent) alert(`メンバーが足りません。${requiredPlayers}名以上登録してください。`);
        return null;
    }

    // 1. ステージ抽選
    const availableStages = STAGES.filter(s => s.mode === mode);
    let stage = null;
    if (availableStages.length > 0) {
        stage = availableStages[Math.floor(Math.random() * availableStages.length)];
    }

    // 2. プレイヤー選出（待機スコア制）
    // 参加していない人(スコア大)を優先
    let sortedMembers = [...members].sort((a, b) => {
        const scoreA = state.standbyScores[a] || 0;
        const scoreB = state.standbyScores[b] || 0;
        if (scoreB !== scoreA) return scoreB - scoreA;
        // 同点の場合はランダム
        return Math.random() - 0.5;
    });

    const selectedPlayers = sortedMembers.slice(0, requiredPlayers);
    const unselectedPlayers = sortedMembers.slice(requiredPlayers);

    // 3. チーム分け（アンチ・ペアリング）
    // selectedPlayersを2分割する全パターンを生成
    const combos = getCombinations(selectedPlayers, mode);
    // 重複を省くため、先頭の要素が必ずTeam Aに含まれるパターンのみ抽出
    const firstPlayer = selectedPlayers[0];
    const validCombos = combos.filter(c => c.includes(firstPlayer));

    let bestPartitions = [];
    let minPenalty = Infinity;

    validCombos.forEach(teamA => {
        const teamB = selectedPlayers.filter(p => !teamA.includes(p));
        let penalty = 0;

        // ペナルティ計算: 過去3試合のチーム履歴を参照
        state.teamHistory.forEach(hist => {
            [teamA, teamB].forEach(team => {
                // 同じチームにいたペアを探す (nC2)
                const pairs = getCombinations(team, 2);
                pairs.forEach(pair => {
                    const inRed = hist.red.includes(pair[0]) && hist.red.includes(pair[1]);
                    const inBlue = hist.blue.includes(pair[0]) && hist.blue.includes(pair[1]);
                    if (inRed || inBlue) penalty += 1;
                });
            });
        });

        if (penalty < minPenalty) {
            minPenalty = penalty;
            bestPartitions = [{ red: teamA, blue: teamB }];
        } else if (penalty === minPenalty) {
            bestPartitions.push({ red: teamA, blue: teamB });
        }
    });

    // 最小ペナルティの中からランダムに選択
    const partition = bestPartitions[Math.floor(Math.random() * bestPartitions.length)];

    // 4. ロール枠の決定
    const optSameRole = document.getElementById('opt-same-role').checked;
    const optFixRole = document.getElementById('opt-fix-role').checked;
    
    let redRoles = [];
    let blueRoles = [];

    if (optFixRole) {
        // ロール固定
        const fixedChks = Array.from(document.querySelectorAll('.fix-role-chk:checked')).map(c => c.value);
        let remainingRoles = ROLE_KEYS.filter(r => !fixedChks.includes(r));
        
        // RedとBlueそれぞれ、固定枠＋余りをランダム割り当て
        const generateTeamRoles = () => {
            let roles = [...fixedChks];
            let rem = shuffle([...remainingRoles]);
            while(roles.length < mode) {
                roles.push(rem.pop());
            }
            return roles;
        };
        redRoles = generateTeamRoles();
        blueRoles = generateTeamRoles();
    } else if (optSameRole) {
        // 同ロール選出
        let shuffled = shuffle([...ROLE_KEYS]);
        redRoles = shuffled.slice(0, mode);
        blueRoles = [...redRoles];
    } else {
        // 通常ランダム
        redRoles = shuffle([...ROLE_KEYS]).slice(0, mode);
        blueRoles = shuffle([...ROLE_KEYS]).slice(0, mode);
    }

    // 5. ロールの割り当て（直近履歴回避）
    const assignRoles = (teamPlayers, roleFrame) => {
        const perms = getPermutations(roleFrame);
        let bestAssignments = [];
        let minRolePenalty = Infinity;

        perms.forEach(permRoles => {
            let penalty = 0;
            teamPlayers.forEach((player, i) => {
                const assignedRole = permRoles[i];
                const hist = state.roleHistory[player] || [];
                // 過去2試合の履歴に同じロールがあればペナルティ
                hist.forEach(h => { if (h === assignedRole) penalty += 1; });
            });
            
            if (penalty < minRolePenalty) {
                minRolePenalty = penalty;
                bestAssignments = [permRoles];
            } else if (penalty === minRolePenalty) {
                bestAssignments.push(permRoles);
            }
        });
        return bestAssignments[Math.floor(Math.random() * bestAssignments.length)];
    };

    const redRoleAssignment = assignRoles(partition.red, redRoles);
    const blueRoleAssignment = assignRoles(partition.blue, blueRoles);

    // 6. ヒーローの割り当て (LRU方式)
    const assignHero = (player, role) => {
        let candidates = HEROES.filter(h => h.role === role && !excludedHeroes.has(h.name));
        
        // 個人除外リスト (LIST_NOT_OWNED) の適用
        const userNotOwned = NOT_OWNED.filter(n => n.player_jp_name === player).map(n => n.hero_name);
        candidates = candidates.filter(h => !userNotOwned.includes(h.name));

        // 候補ゼロフォールバック (除外設定が厳しすぎる場合、ルール無視で全キャラから抽出)
        if (candidates.length === 0) {
            candidates = HEROES.filter(h => h.role === role);
        }
        if (candidates.length === 0) return { jp_name: "不明" };

        const hist = state.heroHistory[player] || [];
        
        // 履歴にないヒーローを優先
        let unusedCandidates = candidates.filter(h => !hist.includes(h.name));
        
        if (unusedCandidates.length > 0) {
            return unusedCandidates[Math.floor(Math.random() * unusedCandidates.length)];
        } else {
            // 全て使用済みの場合は、最も古い履歴（histの先頭に近い）ものを選ぶ
            // hist配列は [古い, ..., 新しい]
            candidates.sort((a, b) => {
                let idxA = hist.indexOf(a.name);
                let idxB = hist.indexOf(b.name);
                if(idxA === -1) idxA = -1;
                if(idxB === -1) idxB = -1;
                return idxA - idxB; 
            });
            // 同一古さ（複数ある場合）の中からランダム
            const oldestIdx = hist.indexOf(candidates[0].name);
            const oldestCandidates = candidates.filter(h => hist.indexOf(h.name) === oldestIdx);
            return oldestCandidates[Math.floor(Math.random() * oldestCandidates.length)];
        }
    };

    const buildTeamData = (players, assignedRoles) => {
        let teamData = [];
        players.forEach((player, i) => {
            const role = assignedRoles[i];
            const hero = assignHero(player, role);
            teamData.push({ player, role, hero });
            
            // 履歴の更新
            if(!isSilent) {
                if(!state.roleHistory[player]) state.roleHistory[player] = [];
                state.roleHistory[player].push(role);
                if(state.roleHistory[player].length > 2) state.roleHistory[player].shift();

                if(!state.heroHistory[player]) state.heroHistory[player] = [];
                if(hero.name) {
                    state.heroHistory[player] = state.heroHistory[player].filter(n => n !== hero.name); // 重複削除
                    state.heroHistory[player].push(hero.name);
                    if(state.heroHistory[player].length > 10) state.heroHistory[player].shift();
                }
            }
        });
        
        // アタッカー→ガンナー→スプリンター→タンクの順にソート
        const order = { 'ATTACKER': 1, 'GUNNER': 2, 'SPRINTER': 3, 'TANK': 4 };
        teamData.sort((a, b) => order[a.role] - order[b.role]);
        return teamData;
    };

    const redResult = buildTeamData(partition.red, redRoleAssignment);
    const blueResult = buildTeamData(partition.blue, blueRoleAssignment);

    // 7. 状態更新（サイレントモードでなければ）
    if (!isSilent) {
        selectedPlayers.forEach(p => state.standbyScores[p] = 0);
        unselectedPlayers.forEach(p => state.standbyScores[p] = (state.standbyScores[p] || 0) + 1);

        state.teamHistory.push({ red: partition.red, blue: partition.blue });
        if(state.teamHistory.length > 3) state.teamHistory.shift();

        // 統計用履歴へ追加
        const matchNo = matchHistory.length + 1;
        redResult.forEach(r => matchHistory.push([matchNo, '紅', r.player, ROLES[r.role], r.hero.jp_name]));
        blueResult.forEach(r => matchHistory.push([matchNo, '蒼', r.player, ROLES[r.role], r.hero.jp_name]));

        // 描画
        renderResult(stage, redResult, blueResult);
    }

    return { red: redResult, blue: blueResult };
}

// --- 7. 結果表示 ---
function renderResult(stage, redData, blueData) {
    const area = document.getElementById('result-area');
    area.style.display = 'block';

    const stageEl = document.getElementById('result-stage');
    stageEl.textContent = stage ? `ステージ: ${stage.jp_name}` : 'ステージ指定なし';

    const buildHtml = (teamId, teamName, data) => {
        const container = document.getElementById(`team-${teamId}-container`);
        container.className = `team-card team-${teamId}`;
        container.innerHTML = '';

        // ヘッダー
        const header = document.createElement('div');
        header.className = 'team-header';
        
        const titleSpan = document.createElement('span');
        titleSpan.textContent = `${teamName}チーム`;
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = 'リストをコピー';
        copyBtn.onclick = () => {
            const listStr = `${teamName}チーム：${data.map(d => d.player).join('、')}`;
            navigator.clipboard.writeText(listStr).then(() => {
                copyBtn.textContent = 'コピーしました！';
                copyBtn.style.backgroundColor = teamId === 'red' ? '#e83828' : '#004dff';
                copyBtn.style.color = '#fff';
                setTimeout(() => {
                    copyBtn.textContent = 'リストをコピー';
                    copyBtn.style.backgroundColor = 'transparent';
                    copyBtn.style.color = '';
                }, 2000);
            }).catch(() => alert('コピーに失敗しました'));
        };

        header.appendChild(titleSpan);
        header.appendChild(copyBtn);
        container.appendChild(header);

        // オプション：カテゴリのみ表示
        const hideHero = document.getElementById('opt-hide-hero').checked;

        // 行の生成
        data.forEach(d => {
            const row = document.createElement('div');
            row.className = 'player-row';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'player-name';
            nameDiv.textContent = d.player;
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'player-role';
            roleDiv.textContent = ROLES[d.role];

            const heroDiv = document.createElement('div');
            heroDiv.className = 'player-hero';
            heroDiv.textContent = hideHero ? '???' : d.hero.jp_name;

            row.appendChild(nameDiv);
            row.appendChild(roleDiv);
            row.appendChild(heroDiv);
            container.appendChild(row);
        });

        // テキストフィット処理 (レンダリング後に行う)
        setTimeout(() => {
            container.querySelectorAll('.player-name, .player-hero').forEach(el => {
                let fontSize = 16;
                el.style.fontSize = fontSize + 'px';
                while (el.scrollWidth > el.clientWidth && fontSize > 9) {
                    fontSize--;
                    el.style.fontSize = fontSize + 'px';
                }
            });
        }, 0);
    };

    buildHtml('red', '紅', redData);
    buildHtml('blue', '蒼', blueData);
}

// --- 8. デバッグ機能 ---

// グローバルにエクスポート
window.dumpHistory = function() {
    let tsv = "マッチNo\t所属チーム\t参加者\t使用ロール(和名)\t使用ヒーロー(和名)\n";
    matchHistory.forEach(row => {
        tsv += row.join('\t') + '\n';
    });
    console.log(tsv);
    return "コンソールに出力しました。";
};

window.checkMatching = function() {
    const requiredPlayers = parseInt(document.querySelector('input[name="mode"]:checked').value) * 2;
    if (members.length < requiredPlayers) {
        console.warn('メンバーが不足しています');
        return;
    }
    console.log("自動マッチングテストを開始します (100回)...");
    for (let i = 0; i < 100; i++) {
        // isSilent=false で状態更新させるが、描画は重いため一旦DOM更新を保留する手法もある。
        // ここでは仕様「再描画を行わない」を満たすため、一時的にDOM関数を無効化する
        const originRender = renderResult;
        renderResult = () => {}; // 描画無効化
        executeMatching(false);
        renderResult = originRender; // 復元
    }
    // 最後に1回だけ描画するための空キック(最新状態は反映されないがUIは更新されない)
    // テスト後手動で生成ボタンを押せば確認可能
    console.log("テスト完了。結果を確認するには dumpHistory() を実行してください。");
};
